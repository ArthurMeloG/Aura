version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unbot
      POSTGRES_PASSWORD: unbot_pass
      POSTGRES_DB: unbot_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unbot_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
